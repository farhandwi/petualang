name: petualang
description: "Aplikasi pemesanan tiket gunung dan sewa alat mendaki."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # HTTP & Networking
  http: ^1.2.2

  # Secure storage for JWT token
  flutter_secure_storage: ^9.2.2

  # State management
  provider: ^6.1.2

  # Google Fonts (Be Vietnam Pro)
  google_fonts: ^6.2.1
  intl: ^0.20.2
  url_launcher: ^6.3.2

  # Media upload (galeri device)
  image_picker: ^1.1.2

  # WebSocket client (real-time chat)
  web_socket_channel: ^3.0.1
  permission_handler: ^12.0.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  share_plus: ^12.0.2
  video_player: ^2.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
