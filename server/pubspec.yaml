name: petualang_server
description: Backend server for Petualang app using dart_frog + PostgreSQL
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  dart_frog: ^1.2.0
  dart_frog_web_socket: ^1.0.0
  postgres: ^2.6.4
  dart_jsonwebtoken: ^2.12.2
  crypto: ^3.0.3
  http: ^1.6.0
  dotenv: ^4.2.0
  mime: ^2.0.0
  path: ^1.9.0

dev_dependencies:
  dart_frog_cli: ^1.2.0
  test: ^1.24.0
